<nav class="flex items-center justify-between py-4 px-6 lg:px-8" x-data="{ mobileMenu: false }">
    <a href="/" class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-teal-600 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342"/></svg>
        </div>
        <span class="text-lg font-bold text-slate-900 tracking-tight">ClinicOS</span>
    </a>

    <!-- Desktop nav -->
    <div class="hidden md:flex items-center gap-2">
        {% if user %}
            {% set is_setup = request and request.url.path.startswith('/setup') %}
            {% if is_setup %}
                <span class="px-4 py-2 text-sm font-medium text-teal-700 bg-teal-50 rounded-lg">Setup in progress</span>
            {% else %}
                <a href="/dashboard" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 rounded-lg hover:bg-slate-100 transition">Dashboard</a>
                <a href="/auth/logout" class="px-4 py-2 text-sm font-medium text-white bg-slate-900 hover:bg-slate-800 rounded-lg transition">Logout</a>
            {% endif %}
        {% else %}
            <button onclick="window.dispatchEvent(new CustomEvent('open-signin'))" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 rounded-lg hover:bg-slate-100 transition">Sign In</button>
            <button onclick="window.dispatchEvent(new CustomEvent('open-signup'))" class="px-4 py-2 text-sm font-medium text-white bg-teal-600 hover:bg-teal-700 rounded-lg transition">Get Started</button>
        {% endif %}
    </div>

    <!-- Mobile menu button -->
    <button class="md:hidden p-2 rounded-lg hover:bg-slate-100" @click="mobileMenu = !mobileMenu">
        <svg class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
    </button>

    <!-- Mobile dropdown -->
    <div x-show="mobileMenu" x-cloak @click.outside="mobileMenu = false"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-1"
         x-transition:enter-end="opacity-100 translate-y-0"
         class="absolute top-16 right-4 left-4 md:hidden bg-white rounded-xl shadow-lg border border-slate-200 p-4 z-50">
        {% if user %}
            <a href="/dashboard" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 rounded-lg">Dashboard</a>
            <a href="/auth/logout" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 rounded-lg">Logout</a>
        {% else %}
            <button onclick="window.dispatchEvent(new CustomEvent('open-signin'))" class="block w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 rounded-lg">Sign In</button>
            <button onclick="window.dispatchEvent(new CustomEvent('open-signup'))" class="block w-full text-left px-4 py-2 text-sm font-medium text-teal-700 hover:bg-teal-50 rounded-lg">Get Started</button>
        {% endif %}
    </div>
</nav>
