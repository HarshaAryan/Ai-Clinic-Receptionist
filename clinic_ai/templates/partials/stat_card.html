<div class="bg-white rounded-xl border border-slate-200 p-5 hover:shadow-md transition-shadow">
    <div class="flex items-center justify-between">
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-400">{{ label }}</p>
        {% if icon_bg is defined %}
        <div class="w-9 h-9 rounded-lg {{ icon_bg }} flex items-center justify-center">
            {% if icon_color is defined %}<span class="text-lg {{ icon_color }}">{{ icon_emoji }}</span>{% endif %}
        </div>
        {% endif %}
    </div>
    <p class="mt-3 text-3xl font-bold text-slate-900">{{ value }}</p>
    {% if hint %}
    <p class="mt-1 text-xs text-slate-500">{{ hint }}</p>
    {% endif %}
</div>
